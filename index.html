<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="description" content="MianScan — Full Website Analyzer. SEO, colors, fonts, tech stack, contacts, links and more."/>
<title>MianScan — Website Analyzer</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- NAV -->
<nav class="topnav">
  <div class="wrap nav-row">
    <a class="logo" href="#"><i class="bi bi-radar"></i> MianScan</a>
    <div class="nav-right">
      <button class="icon-btn" id="compareToggle" title="Compare Mode"><i class="bi bi-arrow-left-right"></i></button>
      <button class="icon-btn" id="themeBtn" title="Toggle theme"><i class="bi bi-moon-stars-fill"></i></button>
    </div>
  </div>
</nav>

<!-- HERO / SINGLE SCAN -->
<section class="hero" id="heroSection">
  <div class="wrap hero-inner">
    <span class="pill"><span class="pill-dot"></span>v1.4 — 12 Powerful Features</span>
    <h1>Analyze Any Website<br><span class="grad">Instantly</span></h1>
    <p class="hero-sub">SEO · Colors · Fonts · Links · Tech Stack · Contacts — all in one scan</p>
    <div class="scan-box">
      <div class="url-row" id="urlRow">
        <i class="bi bi-globe2 url-icon"></i>
        <input id="urlInput" type="url" placeholder="https://stripe.com" autocomplete="off" spellcheck="false"/>
        <button id="scanBtn" class="scan-btn"><i class="bi bi-radar"></i><span>Analyze</span></button>
      </div>
      <div class="try-row">
        <span class="try-label">Try:</span>
        <button class="try-btn" data-url="https://stripe.com">stripe.com</button>
        <button class="try-btn" data-url="https://vercel.com">vercel.com</button>
        <button class="try-btn" data-url="https://github.com">github.com</button>
        <button class="try-btn" data-url="https://linear.app">linear.app</button>
      </div>
    </div>
    <div id="progressBox" class="progress-box hidden">
      <div class="prog-track"><div id="progBar" class="prog-fill"></div></div>
      <div id="progLabel" class="prog-label">Initializing…</div>
    </div>
  </div>
</section>

<!-- COMPARE MODE -->
<section class="compare-hero hidden" id="compareSection">
  <div class="wrap">
    <div class="compare-header">
      <h2><i class="bi bi-arrow-left-right"></i> Compare Two Websites</h2>
      <p class="hero-sub">Scan two sites and see them side by side</p>
    </div>
    <div class="compare-inputs">
      <div class="compare-input-wrap">
        <label class="compare-label">Site A</label>
        <div class="url-row">
          <i class="bi bi-globe2 url-icon"></i>
          <input id="urlA" type="url" placeholder="https://site-a.com" autocomplete="off" spellcheck="false"/>
        </div>
      </div>
      <div class="compare-vs">VS</div>
      <div class="compare-input-wrap">
        <label class="compare-label">Site B</label>
        <div class="url-row">
          <i class="bi bi-globe2 url-icon"></i>
          <input id="urlB" type="url" placeholder="https://site-b.com" autocomplete="off" spellcheck="false"/>
        </div>
      </div>
    </div>
    <div style="text-align:center;margin-top:1.25rem">
      <button id="compareBtn" class="scan-btn"><i class="bi bi-arrow-left-right"></i><span>Compare Sites</span></button>
    </div>
    <div id="compareProgress" class="progress-box hidden" style="max-width:500px;margin:1.25rem auto 0">
      <div class="prog-track"><div id="compareBar" class="prog-fill"></div></div>
      <div id="compareLabel" class="prog-label">Scanning…</div>
    </div>
  </div>
</section>

<!-- SINGLE RESULTS -->
<main id="results" class="hidden">
  <div class="wrap">
    <div id="siteBanner" class="site-banner"></div>
    <div id="statsRow" class="stats-row"></div>
    <div class="tabs-bar">
      <div class="tabs" id="tabs">
        <button class="tab active" data-tab="overview"><i class="bi bi-grid-3x3-gap-fill"></i> Overview</button>
        <button class="tab" data-tab="seo"><i class="bi bi-graph-up-arrow"></i> SEO</button>
        <button class="tab" data-tab="keywords"><i class="bi bi-tags-fill"></i> Keywords</button>
        <button class="tab" data-tab="links"><i class="bi bi-link-45deg"></i> Links</button>
        <button class="tab" data-tab="images"><i class="bi bi-image-fill"></i> Images SEO</button>
        <button class="tab" data-tab="contacts"><i class="bi bi-person-lines-fill"></i> Contacts</button>
        <button class="tab" data-tab="cta"><i class="bi bi-cursor-fill"></i> CTAs</button>
        <button class="tab" data-tab="tech"><i class="bi bi-cpu-fill"></i> Tech Stack</button>
        <button class="tab" data-tab="colors"><i class="bi bi-palette-fill"></i> Colors</button>
        <button class="tab" data-tab="fonts"><i class="bi bi-type"></i> Fonts</button>
        <button class="tab" data-tab="performance"><i class="bi bi-speedometer2"></i> Performance</button>
      </div>
    </div>
    <div id="tabContent" class="tab-content"></div>
    <div class="export-row">
      <span class="export-lbl"><i class="bi bi-download"></i> Export:</span>
      <button class="exp-btn" id="btnJSON"><i class="bi bi-filetype-json"></i> JSON</button>
      <button class="exp-btn" id="btnPDF"><i class="bi bi-file-pdf"></i> PDF</button>
      <button class="exp-btn" id="btnCSS"><i class="bi bi-filetype-css"></i> Color CSS</button>
      <button class="exp-btn" id="btnCopy"><i class="bi bi-clipboard-check"></i> Copy Report</button>
    </div>
  </div>
</main>

<!-- COMPARE RESULTS -->
<section id="compareResults" class="hidden">
  <div class="wrap">
    <div id="compareOutput"></div>
  </div>
</section>

<!-- FOOTER -->
<footer class="foot">
  <div class="wrap foot-row">
    <span class="foot-brand"><i class="bi bi-radar"></i> MianScan <span class="foot-ver">v1.4</span></span>
    <span>Built by <a href="https://multimian.com/" target="_blank">MultiMian</a></span>
    <a href="https://multimian.com/" target="_blank"><i class="bi bi-globe2"></i> multimian.com</a>
  </div>
</footer>

<div id="toast" class="toast-msg"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="js/analyzers/colors.js"></script>
<script src="js/analyzers/fonts.js"></script>
<script src="js/analyzers/structure.js"></script>
<script src="js/analyzers/content.js"></script>
<script src="js/analyzers/cta.js"></script>
<script src="js/analyzers/seo.js"></script>
<script src="js/analyzers/media.js"></script>
<script src="js/analyzers/links.js"></script>
<script src="js/analyzers/images.js"></script>
<script src="js/analyzers/contacts.js"></script>
<script src="js/analyzers/tech.js"></script>
<script src="js/analyzers/performance.js"></script>
<script src="js/scanner.js"></script>
<script src="js/ui.js"></script>
<script src="js/compare.js"></script>
<script src="js/export.js"></script>
<script src="js/app.js"></script>
</body>
</html>
