<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Page Not Found — MianScan</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
<link rel="stylesheet" href="css/style.css"/>
<link rel="stylesheet" href="css/landing.css"/><link rel="stylesheet" href="css/responsive.css"/>
</head>
<body>

<nav class="topnav">
  <div class="wrap nav-row">
    <a class="logo" href="index.html"><i class="bi bi-radar"></i> MianScan</a>
    <div class="nav-links">
      <a href="features.html">Features</a>
      <a href="how-it-works.html">How It Works</a>
      <a href="compare.html">Compare</a>
      <a href="tools.html">Tools</a>
      <a href="index.html#scanner-app" class="nav-cta"><i class="bi bi-radar"></i> Try Now</a>
    </div>
    <div class="nav-right">
      <button class="icon-btn" id="themeBtn"><i class="bi bi-moon-stars-fill"></i></button>
    </div>
  </div>
</nav>

<section style="min-height:80vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:4rem 1.5rem;position:relative;overflow:hidden">
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(100,112,255,.18) 0%,transparent 70%);pointer-events:none"></div>
  <div style="position:relative;max-width:520px">
    <div style="font-family:'Space Grotesk',sans-serif;font-size:7rem;font-weight:900;line-height:1;background:linear-gradient(135deg,#6470ff,#00d4ff,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1rem">404</div>
    <h1 style="font-family:'Space Grotesk',sans-serif;font-size:1.75rem;font-weight:800;margin-bottom:.875rem;color:var(--text)">Page Not Found</h1>
    <p style="color:var(--muted);font-size:1rem;line-height:1.7;margin-bottom:2rem">The page you're looking for doesn't exist or was moved. Let's get you back on track.</p>
    <div style="display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap">
      <a href="index.html" style="display:inline-flex;align-items:center;gap:.5rem;background:linear-gradient(135deg,#6470ff,#a855f7);color:#fff;border-radius:12px;padding:.875rem 1.75rem;font-weight:700;font-size:.95rem;text-decoration:none;box-shadow:0 8px 24px rgba(100,112,255,.4)">
        <i class="bi bi-house-fill"></i> Go Home
      </a>
      <a href="index.html#scanner-app" style="display:inline-flex;align-items:center;gap:.5rem;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:.875rem 1.75rem;font-weight:600;font-size:.95rem;text-decoration:none">
        <i class="bi bi-radar"></i> Try Scanner
      </a>
    </div>
  </div>
</section>

<script>
const saved = localStorage.getItem('ms_theme') || 'dark';
document.documentElement.setAttribute('data-theme', saved);
document.querySelector('#themeBtn i').className = saved === 'light' ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
document.getElementById('themeBtn').addEventListener('click', () => {
  const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('ms_theme', next);
  document.querySelector('#themeBtn i').className = next === 'light' ? 'bi bi-sun-fill' : 'bi bi-moon-stars-fill';
});
</script>
</body>
</html>
